apiVersion: apps/v1
kind: Deployment
metadata:
  name: delta-ro
  namespace: delta-ro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delta-ro
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: delta-ro
    spec:
      containers:
        - name: delta-ro
          image: mariuseu/delta-ro:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: delta-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: delta-ro-service
  namespace: delta-ro
spec:
  type: NodePort
  selector:
    app: delta-ro
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 32529
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: delta-ro-ingress
  namespace: delta-ro
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: delta.slax.ro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: delta-ro-service
                port:
                  number: 8000
