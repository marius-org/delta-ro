<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Delta-RO | Brand Wars</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0b10;color:#e2e8f0;font-family:'Share Tech Mono',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
canvas{display:block;cursor:none;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#hud{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:30px;background:rgba(15,17,26,0.9);padding:15px 40px;border-radius:12px;border:1px solid #00f2ff;display:none;}
.hud-val{font-family:'Orbitron';font-size:24px;color:#fff;}
#bottom-ui{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:none;gap:40px;}
.bar-bg{width:200px;height:14px;background:#050505;border:1px solid #333;padding:2px;}
.bar-fill{height:100%;background:#00f2ff;transition:0.3s;}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0b10;pointer-events:all;}
.btn{font-family:'Orbitron';font-size:18px;background:#00f2ff;padding:20px 60px;cursor:pointer;border:none;clip-path:polygon(10% 0,100% 0,90% 100%,0% 100%);}
#crosshair{position:absolute;width:20px;height:20px;border:2px solid #00f2ff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
    <div id="hud"><div class="hud-val" id="h-score">SCORE: 0</div><div class="hud-val" id="h-wave">WAVE: 1</div></div>
    <div id="bottom-ui"><div class="bar-bg"><div id="hp-fill" class="bar-fill" style="width:100%; background:#ff006e;"></div></div></div>
    <div class="overlay" id="screen-start">
        <h1 style="font-family:'Orbitron'; font-size:60px; color:#00f2ff; margin-bottom:20px;">DELTA-RO</h1>
        <button class="btn" onclick="startGame()">START ENGINE</button>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const MW=30, MH=22, TILE=40;
let W, H, offX, offY;

const imgs = {
    bmw: new Image(),
    rivals: [new Image(), new Image(), new Image()]
};
imgs.bmw.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/BMW.svg/2048px-BMW.svg.png';
imgs.rivals[0].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Mercedes-Logo.svg/2048px-Mercedes-Logo.svg.png';
imgs.rivals[1].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Audi_logo_detail.svg/2048px-Audi_logo_detail.svg.png';
imgs.rivals[2].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Volkswagen_logo_2019.svg/2048px-Volkswagen_logo_2019.svg.png';

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    offX = (W - (MW * TILE)) / 2;
    offY = (H - (MH * TILE)) / 2;
}
window.onresize = resize; resize();

let p = {x:600, y:440, r:18, hp:100, angle:0};
let enemies = [], keys = {}, mouse = {x:0, y:0};

function startGame() {
    document.getElementById('screen-start').style.display='none';
    document.getElementById('hud').style.display='flex';
    document.getElementById('bottom-ui').style.display='flex';
    for(let i=0; i<6; i++) spawn();
    loop();
}

function spawn() {
    enemies.push({x:Math.random()*MW*TILE, y:Math.random()*MH*TILE, r:18, img:imgs.rivals[Math.floor(Math.random()*3)], angle:0});
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    if(keys['w']) p.y -= 4; if(keys['s']) p.y += 4;
    if(keys['a']) p.x -= 4; if(keys['d']) p.x += 4;
    p.angle = Math.atan2(mouse.y - (p.y + offY), mouse.x - (p.x + offX));
    enemies.forEach(e => {
        let dx = p.x-e.x, dy = p.y-e.y;
        e.angle = Math.atan2(dy, dx);
        e.x += Math.cos(e.angle)*2; e.y += Math.sin(e.angle)*2;
    });
}

function draw() {
    ctx.fillStyle = '#0a0b10'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(offX, offY);

    // GRID
    ctx.strokeStyle = '#1a1d2e';
    for(let i=0; i<=MW*TILE; i+=TILE) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,MH*TILE); ctx.stroke(); }
    for(let i=0; i<=MH*TILE; i+=TILE) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(MW*TILE,i); ctx.stroke(); }

    // RIVALS
    enemies.forEach(e => {
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle + Math.PI/2);
        if(e.img.complete) ctx.drawImage(e.img, -e.r, -e.r, e.r*2, e.r*2);
        ctx.restore();
    });

    // BMW
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle + Math.PI/2);
    ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
    if(imgs.bmw.complete) ctx.drawImage(imgs.bmw, -p.r, -p.r, p.r*2, p.r*2);
    ctx.restore();

    ctx.restore();
}

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { 
    mouse.x = e.clientX; mouse.y = e.clientY; 
    document.getElementById('crosshair').style.left = mouse.x+'px';
    document.getElementById('crosshair').style.top = mouse.y+'px';
};
</script>
<div id="crosshair"></div>
</body>
</html>
