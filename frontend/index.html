<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delta-RO | BMW Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050508; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; box-shadow: 0 0 50px #000; border: 1px solid #1a1d2e; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .overlay { position: absolute; inset: 0; background: rgba(5,5,10,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
        .btn { padding: 15px 40px; background: #00f2ff; border: none; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }
        .btn:disabled { background: #222; color: #444; cursor: wait; }
        #hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 40px; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 5px; border: 1px solid #00f2ff; }
    </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="ui">
    <div id="hud">
        <div id="score-display">SCORE: 0</div>
        <div id="wave-display">WAVE: 1</div>
    </div>
    <div class="overlay" id="starter">
        <h1 style="color:#00f2ff; font-size: 50px;">DELTA-RO</h1>
        <button class="btn" id="start-btn" onclick="run()" disabled>LOADING LOGOS...</button>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const MW=30, MH=22, TILE=40;
let W, H, offX, offY, loaded = 0;

// IMAGE PRELOADING (CRITICAL FIX)
const imgs = {
    player: new Image(),
    rivals: [new Image(), new Image(), new Image()]
};
imgs.player.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/BMW.svg/2048px-BMW.svg.png';
imgs.rivals[0].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Mercedes-Logo.svg/2048px-Mercedes-Logo.svg.png';
imgs.rivals[1].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Audi_logo_detail.svg/2048px-Audi_logo_detail.svg.png';
imgs.rivals[2].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Volkswagen_logo_2019.svg/2048px-Volkswagen_logo_2019.svg.png';

[imgs.player, ...imgs.rivals].forEach(img => {
    img.onload = () => { loaded++; if(loaded === 4) { 
        document.getElementById('start-btn').disabled = false; 
        document.getElementById('start-btn').textContent = "START ENGINE"; 
    }};
});

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    offX = (W - (MW * TILE)) / 2;
    offY = (H - (MH * TILE)) / 2;
}
window.onresize = resize; resize();

let p = { x: MW*TILE/2, y: MH*TILE/2, r: 18, angle: 0 };
let enemies = [];
let keys = {}, mouse = { x:0, y:0 };

function run() {
    document.getElementById('starter').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    for(let i=0; i<5; i++) spawnEnemy();
    loop();
}

function spawnEnemy() {
    enemies.push({
        x: Math.random() * MW * TILE,
        y: Math.random() * MH * TILE,
        r: 18,
        img: imgs.rivals[Math.floor(Math.random()*3)],
        angle: 0
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    if(keys['w']) p.y -= 5; if(keys['s']) p.y += 5;
    if(keys['a']) p.x -= 5; if(keys['d']) p.x += 5;
    p.angle = Math.atan2(mouse.y - (p.y + offY), mouse.x - (p.x + offX));
    
    enemies.forEach(e => {
        let dx = p.x - e.x, dy = p.y - e.y;
        e.angle = Math.atan2(dy, dx);
        e.x += Math.cos(e.angle) * 2;
        e.y += Math.sin(e.angle) * 2;
    });
}

function draw() {
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, W, H);
    
    ctx.save();
    ctx.translate(offX, offY); // FIX: Centers the game board

    // Draw Grid
    ctx.strokeStyle = '#1a1d2e';
    for(let i=0; i<=MW*TILE; i+=TILE) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,MH*TILE); ctx.stroke();
    }
    for(let i=0; i<=MH*TILE; i+=TILE) {
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(MW*TILE,i); ctx.stroke();
    }

    // Draw Rivals
    enemies.forEach(e => {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(e.angle + Math.PI/2);
        ctx.drawImage(e.img, -e.r, -e.r, e.r*2, e.r*2);
        ctx.restore();
    });

    // Draw BMW
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle + Math.PI/2);
    ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
    ctx.drawImage(imgs.player, -p.r, -p.r, p.r*2, p.r*2);
    ctx.restore();

    ctx.restore();
}

window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
</script>
</body>
</html>
