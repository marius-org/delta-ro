<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Delta-RO | Brand Wars</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
/* RESTORING YOUR ORIGINAL HIGH-END STYLES */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0b10;color:#e2e8f0;font-family:'Share Tech Mono',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
canvas{display:block;cursor:none;filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#hud{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;gap:30px;background:rgba(15, 17, 26, 0.85);backdrop-filter: blur(10px);padding:15px 40px;border-radius:12px;border:1px solid rgba(0, 242, 255, 0.3);display:none;}
.hud-block{display:flex;flex-direction:column;gap:2px;align-items:center;}
.hud-label{font-size:10px;color:#00f2ff;letter-spacing:3px;}
.hud-val{font-family:'Orbitron',monospace;font-size:24px;color:#fff;}
#bottom-ui {position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:none;gap:40px;background:rgba(0,0,0,0.8);padding:15px 40px;border-radius:12px;border:1px solid rgba(255, 0, 110, 0.3);}
.bar-bg{width:180px;height:14px;background:#050505;border:1px solid #333;border-radius:3px;padding:2px;overflow:hidden;}
.bar-fill{height:100%;transition:width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);}
#health-fill{background:linear-gradient(90deg, #ff006e, #ff70a6);box-shadow: 0 0 15px rgba(255, 0, 110, 0.6);}
#ammo-fill{background:linear-gradient(90deg, #00f2ff, #70f3ff);box-shadow: 0 0 15px rgba(0, 242, 255, 0.6);}
#wave-banner{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:72px;color:#fff;text-shadow:0 0 30px #00f2ff;opacity:0;transition:0.5s;pointer-events:none;}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;background:radial-gradient(circle, rgba(20,22,33,0.95) 0%, rgba(5,5,10,1) 100%);pointer-events:all;}
.btn{font-family:'Orbitron',monospace;font-size:16px;letter-spacing:5px;background:#00f2ff;color:#000;border:none;padding:20px 70px;cursor:pointer;transition:0.3s;font-weight:bold;clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);}
.btn:disabled{background:#1e293b; color:#475569; cursor:wait;}
#crosshair{position:absolute;width:24px;height:24px;border: 2px solid #00f2ff; border-radius: 50%; transform:translate(-50%,-50%);pointer-events:none;box-shadow: 0 0 15px #00f2ff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
    <div id="hud">
        <div class="hud-block"><div class="hud-label">SCORE</div><div class="hud-val" id="h-score">0</div></div>
        <div class="hud-block"><div class="hud-label">WAVE</div><div class="hud-val" id="h-wave">1</div></div>
    </div>
    <div id="bottom-ui">
        <div class="bar-bg"><div class="bar-fill" id="health-fill" style="width:100%;"></div></div>
        <div class="bar-bg"><div class="bar-fill" id="ammo-fill" style="width:100%;"></div></div>
    </div>
    <div id="wave-banner"></div>
    <div id="crosshair"></div>
    <div class="overlay" id="screen-start">
        <h1 style="font-family:'Orbitron'; font-size:60px; color:#00f2ff;">DELTA-RO</h1>
        <button class="btn" id="start-btn" onclick="startGame()" disabled>LOADING ASSETS...</button>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const MW=30, MH=22, TILE=40;
let W, H, offX=0, offY=0, loaded=0;

// LOGO PRELOADER - ESSENTIAL FIX
const imgs = {
    bmw: new Image(),
    rivals: [new Image(), new Image(), new Image()]
};
imgs.bmw.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/BMW.svg/2048px-BMW.svg.png';
imgs.rivals[0].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Mercedes-Logo.svg/2048px-Mercedes-Logo.svg.png';
imgs.rivals[1].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Audi_logo_detail.svg/2048px-Audi_logo_detail.svg.png';
imgs.rivals[2].src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Volkswagen_logo_2019.svg/2048px-Volkswagen_logo_2019.svg.png';

[imgs.bmw, ...imgs.rivals].forEach(i => i.onload = () => {
    loaded++; if(loaded === 4) {
        document.getElementById('start-btn').disabled = false;
        document.getElementById('start-btn').textContent = "START ENGINE";
    }
});

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    offX = Math.max(0, (W - (MW * TILE)) / 2); // RE-CENTERING FIX
    offY = Math.max(0, (H - (MH * TILE)) / 2);
}
window.addEventListener('resize', resize); resize();

let state = { p:{x:600, y:440, r:18, hp:100, ammo:40, angle:0}, enemies:[], bullets:[], wave:1, score:0 };
let keys = {}, mouse = {x:0, y:0, down:false};

function startGame() {
    document.getElementById('screen-start').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('bottom-ui').style.display = 'flex';
    spawnWave();
    loop();
}

function spawnWave() {
    state.enemies = [];
    for(let i=0; i<state.wave*3; i++) {
        state.enemies.push({
            x: Math.random()*MW*TILE, y: Math.random()*MH*TILE, 
            r:18, img: imgs.rivals[Math.floor(Math.random()*3)],
            hp: 1, angle: 0, scd: 0
        });
    }
    const b = document.getElementById('wave-banner');
    b.textContent = "ROUND " + state.wave; b.style.opacity = 1;
    setTimeout(() => b.style.opacity = 0, 2000);
}

function loop() {
    update(); draw();
    requestAnimationFrame(loop);
}

function update() {
    const p = state.p;
    p.angle = Math.atan2(mouse.y - (p.y + offY), mouse.x - (p.x + offX));
    if(keys['w']) p.y -= 4; if(keys['s']) p.y += 4;
    if(keys['a']) p.x -= 4; if(keys['d']) p.x += 4;

    state.enemies.forEach(e => {
        let dx = p.x - e.x, dy = p.y - e.y, d = Math.hypot(dx, dy);
        e.angle = Math.atan2(dy, dx);
        if(d > 50) { e.x += Math.cos(e.angle)*2; e.y += Math.sin(e.angle)*2; }
    });
}

function draw() {
    ctx.fillStyle = '#0a0b10'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(offX, offY);

    // GRID
    ctx.strokeStyle = '#1a1d2e';
    for(let i=0; i<=MW*TILE; i+=TILE) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,MH*TILE); ctx.stroke(); }

    // RIVAL LOGOS
    state.enemies.forEach(e => {
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle + Math.PI/2);
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff006e';
        ctx.drawImage(e.img, -e.r, -e.r, e.r*2, e.r*2);
        ctx.restore();
    });

    // BMW PLAYER
    ctx.save(); ctx.translate(state.p.x, state.p.y); ctx.rotate(state.p.angle + Math.PI/2);
    ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
    ctx.drawImage(imgs.bmw, -state.p.r, -state.p.r, state.p.r*2, state.p.r*2);
    ctx.restore();

    ctx.restore();
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { 
    mouse.x = e.clientX; mouse.y = e.clientY; 
    const c = document.getElementById('crosshair');
    c.style.left = mouse.x+'px'; c.style.top = mouse.y+'px';
});
</script>
</body>
</html>
