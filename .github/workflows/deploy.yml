name: Build & Deploy Delta-RO

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: control-node
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mariuseu/delta-ro:latest
            mariuseu/delta-ro:${{ env.IMAGE_TAG }}

      - name: Deploy to k3s
        run: |
          kubectl apply -f k3s/postgres.yaml
          kubectl apply -f k3s/deployment.yaml
          kubectl set image deployment/delta-ro \
            delta-ro=mariuseu/delta-ro:${{ env.IMAGE_TAG }} \
            -n delta-ro
          kubectl rollout status deployment/delta-ro -n delta-ro --timeout=120s

      - name: Verify
        run: |
          kubectl get pods -n delta-ro
          kubectl get svc -n delta-ro
